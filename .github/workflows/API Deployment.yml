name: API Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    steps:

      - name: Deploy API
        run: |
          echo "Deploying API..."

      - name: Trigger Frontend Deployment
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            https://api.github.com/repos/pallavigreddy98/Repository-Dispatch-Event-Insurance-Web/dispatches \
            -d '{
              "event_type":"deploy-frontend",
              "client_payload":{
                "environment":"production",
                "version":"1.5.0"
              }
            }'	
